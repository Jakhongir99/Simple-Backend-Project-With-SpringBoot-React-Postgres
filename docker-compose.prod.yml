# Docker Desktop guruh nomi (bitta project)
name: java_simple

services:
  postgres:
    image: postgres:15-alpine
    container_name: java-simple-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crud_demo}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-crud_demo}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: java-simple-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  backend:
    image: ${BACKEND_IMAGE:-java-simple-backend}:${BACKEND_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    container_name: java-simple-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-crud_demo}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_REDIS_HOST: redis
      SPRING_CACHE_TYPE: ${SPRING_CACHE_TYPE:-simple}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      # OAuth: loyiha ildizidagi .env dan (.\scripts\sync-oauth-env.ps1)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-your-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-your-github-client-id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-your-github-client-secret}
      FILE_UPLOAD_PATH: /app/uploads/
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads_prod_data:/app/uploads
    networks:
      - app-network

  frontend:
    image: ${FRONTEND_IMAGE:-java-simple-frontend}:${FRONTEND_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile.frontend
    pull_policy: build
    container_name: java-simple-frontend-prod
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - app-network

volumes:
  # Mavjud DB volume'lari (eski java-simple project dan)
  postgres_prod_data:
    name: java-simple_postgres_prod_data
    external: true
  redis_prod_data:
    name: java-simple_redis_prod_data
    external: true
  uploads_prod_data:
    name: java-simple_uploads_prod_data
    external: true

networks:
  app-network:
    driver: bridge
