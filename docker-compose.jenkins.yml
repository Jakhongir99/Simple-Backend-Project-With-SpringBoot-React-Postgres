# Jenkins + Docker CI/CD stack
# Requires Docker Desktop running.
# Start: docker compose -f docker-compose.jenkins.yml up -d
# Jenkins UI: http://localhost:8081
# Initial admin password: docker exec jenkins cat /var/jenkins_home/secrets/initialAdminPassword

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    networks:
      - ci-network

volumes:
  jenkins_home:

networks:
  ci-network:
    driver: bridge
