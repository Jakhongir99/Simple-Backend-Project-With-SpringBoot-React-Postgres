# Jenkins + Docker CI/CD stack
# Start: .\scripts\run-jenkins.ps1
# UI: http://localhost:8081

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    image: java-simple-jenkins:latest
    container_name: jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace
    group_add:
      - "0"
    networks:
      - ci-network

volumes:
  jenkins_home:

networks:
  ci-network:
    driver: bridge
