# Production profile — activate with SPRING_PROFILES_ACTIVE=prod

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/crud_demo}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

server.port=${PORT:8080}

logging.level.root=WARN
logging.level.com.example=INFO
logging.level.org.springframework.web=WARN

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}

spring.redis.host=${SPRING_REDIS_HOST:redis}
spring.redis.port=${SPRING_REDIS_PORT:6379}
spring.cache.type=${SPRING_CACHE_TYPE:simple}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

file.upload.path=${FILE_UPLOAD_PATH:./uploads/}

springdoc.swagger-ui.enabled=false
